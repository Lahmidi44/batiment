# Syncs index.html to main so the GitHub Pages deployment (which runs
# without approval restrictions on the default branch) picks it up.
name: Sync index.html to main

on:
  push:
    branches: ["copilot/link-working-directly"]
    paths: ["index.html"]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push index.html to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git fetch origin main
          git checkout main
          git checkout ${{ github.sha }} -- index.html
          git add index.html
          git diff --staged --quiet || git commit -m "Sync index.html from ${{ github.ref_name }} [skip ci]"
          git push origin main
